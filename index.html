<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KOVA OS - Content Calendar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#5f5e5e",
                        "on-primary-fixed": "#1c1b1b",
                        "on-tertiary-fixed-variant": "#2a5000",
                        "secondary-fixed-dim": "#c7c6c6",
                        "secondary": "#5e5e5e",
                        "on-surface": "#1c1c17",
                        "technical-block": "#2a1f16",
                        "on-primary": "#ffffff",
                        "surface-dim": "#dddad2",
                        "primary-fixed": "#e5e2e1",
                        "surface-container-lowest": "#ffffff",
                        "inverse-surface": "#31302b",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed": "#1a1c1c",
                        "tertiary-fixed-dim": "#87dc2c",
                        "on-surface-variant": "#444748",
                        "on-tertiary-fixed": "#0e2000",
                        "surface-bright": "#fdf9f1",
                        "surface": "#fdf9f1",
                        "on-primary-container": "#858383",
                        "on-error-container": "#93000a",
                        "on-tertiary-container": "#539400",
                        "surface-container-high": "#ece8e0",
                        "primary": "#000000",
                        "on-secondary": "#ffffff",
                        "tertiary-container": "#0e2000",
                        "outline-variant": "#c4c7c7",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#474646",
                        "on-secondary-container": "#626363",
                        "inverse-primary": "#c9c6c5",
                        "background": "#fdf9f1",
                        "surface-dark": "#241a12",
                        "surface-container-highest": "#e6e2da",
                        "on-background": "#1c1c17",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#c9c6c5",
                        "surface-container": "#f1ede5",
                        "tertiary-fixed": "#a1fa49",
                        "secondary-fixed": "#e3e2e2",
                        "secondary-container": "#e0dfdf",
                        "tertiary": "#000000",
                        "on-secondary-fixed-variant": "#464747",
                        "primary-container": "#1c1b1b",
                        "inverse-on-surface": "#f4f0e8",
                        "outline": "#747878",
                        "surface-container-low": "#f7f3eb",
                        "on-error": "#ffffff",
                        "surface-variant": "#e6e2da",
                        "brand-accent": "#7ed321"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-internal": "10%",
                        "accent-width-centered": "25%",
                        "gutter": "24px",
                        "technical-line-weight": "2px",
                        "accent-width-asymmetric": "35%"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "metadata": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-xl": ["Inter"],
                        "label-technical": ["JetBrains Mono"],
                        "headline-lg-mobile": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                        "metadata": ["14px", {"lineHeight": "1.4", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "0.01em", "fontWeight": "500"}],
                        "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "0.02em", "fontWeight": "600"}],
                        "label-technical": ["12px", {"lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "letterSpacing": "0.01em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
    <style>
        body { background-color: #fdf9f1; color: #1c1c17; overflow-x: hidden; }
        .technical-line { height: 2px; background-color: #7ed321; }
        .asymmetric-divider { width: 35%; margin-left: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        input:focus, select:focus { outline: none; border-bottom-color: #7ed321 !important; }
    </style>
</head>
<body class="font-body-md text-on-surface">

<aside class="h-full w-64 fixed left-0 top-0 border-r technical-line-weight border-outline-variant bg-surface flex flex-col py-gutter px-6 z-40">
    <div class="mb-12">
        <h1 class="font-headline-lg text-headline-lg font-semibold tracking-tight text-primary">KOVA OS</h1>
        <p class="font-label-technical text-label-technical text-on-surface-variant uppercase mt-1">Studio Edition</p>
    </div>
    <nav class="flex-1 space-y-4">
        <a class="flex items-center gap-3 text-primary font-bold border-l-2 border-primary pl-2" href="#">
            <span class="material-symbols-outlined">calendar_today</span>
            <span class="font-body-md">Content OS</span>
        </a>
        <a class="flex items-center gap-3 text-on-surface-variant font-normal pl-2 hover:text-primary transition-colors duration-200" href="#">
            <span class="material-symbols-outlined">folder_copy</span>
            <span class="font-body-md">Database</span>
        </a>
    </nav>
</aside>

<header class="fixed top-0 right-0 w-[calc(100%-16rem)] border-b technical-line-weight border-outline-variant bg-surface flex justify-between items-center h-16 px-gutter ml-64 z-30">
    <div class="flex items-center flex-1">
        <div class="relative w-full max-w-md">
            <span class="absolute left-0 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant">search</span>
            <input id="search-input" oninput="filterData()" class="w-full bg-transparent border-none pl-8 font-body-md text-on-surface focus:ring-0" placeholder="Search resources..." type="text"/>
        </div>
    </div>
</header>

<main class="ml-64 pt-16 min-h-screen">
    <div class="px-margin-internal py-12">
        <section class="mb-12">
            <h2 class="font-headline-xl text-headline-xl text-primary tracking-[0.1em] uppercase mb-4">Library</h2>
            <div class="technical-line asymmetric-divider mb-8"></div>
            
            <div class="flex flex-wrap items-end gap-8 pb-4">
                <div class="flex flex-col gap-2">
                    <label class="font-label-technical text-label-technical text-on-surface-variant uppercase">Type</label>
                    <select id="type-filter" onchange="filterData()" class="bg-transparent border-b border-outline text-on-surface font-body-md py-1 pr-8 appearance-none cursor-pointer">
                        <option value="All">All Types</option>
                        <option value="Reel">Reel / Video</option>
                        <option value="Stories">Stories / Images</option>
                    </select>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="font-label-technical text-label-technical text-on-surface-variant uppercase">Status</label>
                    <select id="status-filter" onchange="filterData()" class="bg-transparent border-b border-outline text-on-surface font-body-md py-1 pr-8 appearance-none cursor-pointer">
                        <option value="Unpublished">No Publicados (Base)</option>
                        <option value="All">Todos los Estados</option>
                        <option value="Idea">Idea</option>
                        <option value="Ready">Ready</option>
                        <option value="Published">Published / Publicado</option>
                    </select>
                </div>
                <div class="ml-auto flex items-center gap-4">
                    <span class="font-label-technical text-label-technical text-on-surface-variant uppercase">View Mode</span>
                    <div class="flex border border-outline-variant">
                        <button id="btn-grid" onclick="setView('grid')" class="p-1.5 bg-primary text-on-primary transition-colors"><span class="material-symbols-outlined">grid_view</span></button>
                        <button id="btn-list" onclick="setView('list')" class="p-1.5 hover:bg-surface-container-low text-on-surface-variant transition-colors"><span class="material-symbols-outlined">format_list_bulleted</span></button>
                    </div>
                </div>
            </div>
        </section>

        <div id="kova-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>
    </div>
</main>

<div id="script-drawer" class="fixed right-0 top-0 h-full w-[35rem] bg-surface border-l technical-line-weight border-brand-accent z-50 transform translate-x-full transition-transform duration-300 shadow-2xl flex flex-col">
    <div class="p-8 border-b border-outline-variant flex justify-between items-start bg-surface-container-low">
        <div>
            <span id="drawer-tag" class="font-label-technical px-2 py-0.5 bg-brand-accent/20 text-on-tertiary-fixed-variant uppercase mb-3 inline-block">FORMATO</span>
            <h2 id="drawer-title" class="font-headline-lg text-headline-lg font-bold text-primary">Título del Contenido</h2>
            <p id="drawer-date" class="font-body-md text-on-surface-variant mt-2">Fecha</p>
        </div>
        <button onclick="cerrarGuion()" class="text-on-surface-variant hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-3xl">close</span>
        </button>
    </div>
    
    <div class="p-8 flex-1 overflow-y-auto no-scrollbar bg-surface">
        <h3 class="font-label-technical text-on-surface-variant uppercase mb-4 tracking-widest">Script / Director's Notes</h3>
        <textarea id="drawer-content" class="w-full h-full min-h-[400px] bg-surface-container-highest text-primary font-body-md p-6 border border-outline-variant focus:border-brand-accent resize-none rounded-sm outline-none" readonly>Cargando guion...</textarea>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxgE_oZnh-ac8mqma0kDWPiPNplm0SvdsNpBnaY3XmyE4m88h3Q9mGu3WDfAt_6K1-yig/exec';
    let kovaData = []; 
    let currentView = 'grid'; 

    async function initKova() {
        const grid = document.getElementById('kova-grid');
        grid.innerHTML = '<p class="font-label-technical text-primary text-xl col-span-full animate-pulse">INICIALIZANDO CONEXIÓN CON KOVA_CONTENT_OS...</p>';

        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            const calendarRows = data.CALENDAR || [];
            const databaseRows = data.DATABASE || [];
            kovaData = [...calendarRows, ...databaseRows];
            
            filterData();
        } catch (error) {
            grid.innerHTML = '<p class="font-label-technical text-error text-xl col-span-full">SYSTEM ERROR: NO SE PUDO CONECTAR CON LA BASE DE DATOS.</p>';
            console.error(error);
        }
    }

    function setView(view) {
        currentView = view;
        
        document.getElementById('btn-grid').className = view === 'grid' 
            ? 'p-1.5 bg-primary text-on-primary transition-colors' 
            : 'p-1.5 hover:bg-surface-container-low text-on-surface-variant transition-colors';
            
        document.getElementById('btn-list').className = view === 'list' 
            ? 'p-1.5 bg-primary text-on-primary transition-colors' 
            : 'p-1.5 hover:bg-surface-container-low text-on-surface-variant transition-colors';

        filterData(); 
    }

    function filterData() {
        const statusFilter = document.getElementById('status-filter').value;
        const typeFilter = document.getElementById('type-filter').value;
        const searchQuery = document.getElementById('search-input').value.toLowerCase();

        let result = kovaData;

        if (statusFilter === 'Unpublished') {
            result = result.filter(item => {
                const est = (item.Estado || 'Idea').toLowerCase();
                return est !== 'publicado' && est !== 'published';
            });
        } else if (statusFilter !== 'All') {
            result = result.filter(item => (item.Estado || 'Idea').toLowerCase() === statusFilter.toLowerCase());
        }

        if (typeFilter !== 'All') {
            result = result.filter(item => {
                const tipo = (item.Tipo_contenido || item.Tipo_Contenido || '').toLowerCase();
                return tipo.includes(typeFilter.toLowerCase());
            });
        }

        if (searchQuery) {
            result = result.filter(item => {
                const contenido = (item.Concepto || item.Contenido || item.Titulo || '').toLowerCase();
                return contenido.includes(searchQuery);
            });
        }

        renderGrid(result);
    }

    function renderGrid(data) {
        const grid = document.getElementById('kova-grid');
        grid.innerHTML = '';

        if (currentView === 'grid') {
            grid.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8";
        } else {
            grid.className = "flex flex-col gap-3"; 
        }

        if (data.length === 0) {
            grid.innerHTML = '<p class="font-label-technical text-on-surface-variant text-md col-span-full">No se encontraron contenidos con los filtros activos.</p>';
            return;
        }

        data.forEach((item) => {
            const estadoActual = item.Estado || 'Idea'; 
            let bgEstado = '#d1d5db'; 
            let colorEstado = '#444748';
            if (estadoActual === 'Ready') { bgEstado = 'rgba(135,220,44,0.3)'; colorEstado = '#2a5000'; }
            if (estadoActual === 'Publicado' || estadoActual === 'Published') { bgEstado = 'rgba(147,197,253,0.3)'; colorEstado = '#1e3a8a'; }

            const tipo = item.Tipo_contenido || item.Tipo_Contenido || 'Contenido';
            const titulo = item.Concepto || item.Contenido || item.Titulo || 'Sin Título';
            const fechaRaw = item.Fecha_generacion || item.Fecha;
            
            let icon = 'article';
            if(tipo.toLowerCase().includes('reel') || tipo.toLowerCase().includes('video')) icon = 'movie';
            else if(tipo.toLowerCase().includes('stor') || tipo.toLowerCase().includes('photo') || tipo.toLowerCase().includes('image')) icon = 'image';

            let fechaTexto = 'TBD';
            if(fechaRaw) {
                const f = new Date(fechaRaw);
                if(!isNaN(f)) fechaTexto = f.toLocaleDateString('es-ES', { month: 'short', day: 'numeric', year: 'numeric' }).toUpperCase();
            }

            const globalIndex = kovaData.findIndex(x => x === item);
            const card = document.createElement('div');
            card.onclick = () => abrirGuion(globalIndex); 

            if (currentView === 'grid') {
                card.className = "group bg-[#ede9e1] border-t-2 border-brand-accent p-6 flex flex-col h-full transition-all hover:translate-y-[-4px] cursor-pointer";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <span class="material-symbols-outlined text-primary text-2xl">${icon}</span>
                        <span class="font-label-technical px-2 py-0.5 uppercase font-bold" style="background-color: ${bgEstado}; color: ${colorEstado}">${estadoActual}</span>
                    </div>
                    <h3 class="font-body-lg font-bold text-primary mb-2 group-hover:underline">${titulo}</h3>
                    <div class="mt-auto pt-6 flex justify-between items-end">
                        <div>
                            <p class="font-label-technical text-on-surface-variant uppercase">Programado</p>
                            <p class="font-body-md text-primary font-bold">${fechaTexto}</p>
                        </div>
                        <p class="font-label-technical text-on-surface-variant uppercase text-xs">${tipo}</p>
                    </div>
                `;
            } else {
                card.className = "group bg-[#ede9e1] border-l-4 border-brand-accent p-4 flex flex-row items-center justify-between w-full transition-all hover:translate-x-1 cursor-pointer gap-6";
                card.innerHTML = `
                    <div class="flex items-center gap-4 w-48">
                        <span class="material-symbols-outlined text-primary text-2xl">${icon}</span>
                        <span class="font-label-technical px-2 py-0.5 uppercase font-bold text-center w-full" style="background-color: ${bgEstado}; color: ${colorEstado}">${estadoActual}</span>
                    </div>
                    <h3 class="font-body-lg font-bold text-primary group-hover:underline flex-1 truncate">${titulo}</h3>
                    <div class="flex items-center gap-8 w-64 justify-end">
                        <div class="text-right">
                            <p class="font-label-technical text-on-surface-variant uppercase text-[10px]">Programado</p>
                            <p class="font-body-md text-primary font-bold text-sm">${fechaTexto}</p>
                        </div>
                        <p class="font-label-technical text-on-surface-variant uppercase text-xs w-24 text-right">${tipo}</p>
                    </div>
                `;
            }
            grid.appendChild(card);
        });
    }

    function abrirGuion(index) {
        const item = kovaData[index];
        
        const titulo = item.Concepto || item.Contenido || item.Titulo || 'Sin Título';
        const tipo = item.Tipo_contenido || item.Tipo_Contenido || 'Contenido';
        const fechaRaw = item.Fecha_generacion || item.Fecha;
        
        let guionTexto = "";
        
        // 1. Intentar leer guion de la tarjeta seleccionada directamente
        const keys = Object.keys(item);
        const keyExacta = keys.find(k => {
            const cleanKey = k.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            return cleanKey === 'guion';
        });
        
        if (keyExacta && item[keyExacta] && item[keyExacta].toString().trim() !== '') {
            guionTexto = item[keyExacta];
        }

        // 2. CRUCE DE PESTAÑAS: Si viene de CALENDAR y el guion está vacío, buscar la fila homóloga en DATABASE
        if (!guionTexto || guionTexto.trim() === "") {
            const tituloLimpio = titulo.trim().toLowerCase();
            
            const itemRelacionado = kovaData.find(otherItem => {
                const otherTitulo = (otherItem.Concepto || otherItem.Contenido || otherItem.Titulo || "").trim().toLowerCase();
                if (otherTitulo === tituloLimpio && otherItem !== item) {
                    const otherKeys = Object.keys(otherItem);
                    const otherKeyExacta = otherKeys.find(k => k.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") === 'guion');
                    return otherKeyExacta && otherItem[otherKeyExacta] && otherItem[otherKeyExacta].toString().trim() !== '';
                }
                return false;
            });

            if (itemRelacionado) {
                const otherKeys = Object.keys(itemRelacionado);
                const otherKeyExacta = otherKeys.find(k => k.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") === 'guion');
                guionTexto = itemRelacionado[otherKeyExacta];
            } else {
                guionTexto = "No hay guion o notas registradas en ninguna pestaña para este contenido.";
            }
        }

        // 3. Renderizar Panel Lateral
        document.getElementById('drawer-title').innerText = titulo;
        document.getElementById('drawer-tag').innerText = tipo;
        
        let fechaTexto = 'Fecha no programada';
        if(fechaRaw) {
            const f = new Date(fechaRaw);
            if(!isNaN(f)) fechaTexto = f.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        document.getElementById('drawer-date').innerText = fechaTexto;
        document.getElementById('drawer-content').value = guionTexto;

        document.getElementById('script-drawer').classList.remove('translate-x-full');
    }

    function cerrarGuion() {
        document.getElementById('script-drawer').classList.add('translate-x-full');
    }

    initKova();
</script>
</body>
</html>
